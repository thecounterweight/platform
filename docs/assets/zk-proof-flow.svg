<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Participant headers -->
  <rect x="80" y="20" width="120" height="40" rx="6" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="140" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Platform</text>

  <rect x="315" y="20" width="120" height="40" rx="6" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="375" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#333">User Device</text>

  <rect x="550" y="20" width="120" height="40" rx="6" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="610" y="45" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Third Party</text>

  <!-- Lifelines -->
  <line x1="140" y1="60" x2="140" y2="360" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="375" y1="60" x2="375" y2="360" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="610" y1="60" x2="610" y2="360" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: Platform issues credential -->
  <line x1="140" y1="90" x2="372" y2="90" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="256" y="83" text-anchor="middle" font-size="10" fill="#333">Issues cryptographic credential</text>
  <rect x="160" y="100" width="230" height="30" rx="4" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="275" y="119" text-anchor="middle" font-size="9" fill="#666">Credential signed by platform, stored on device</text>

  <!-- Step 2: Device generates ZK proof -->
  <line x1="385" y1="160" x2="385" y2="185" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="375" y1="160" x2="385" y2="160" stroke="#666" stroke-width="1.5"/>
  <line x1="375" y1="185" x2="385" y2="185" stroke="#666" stroke-width="1.5"/>
  <text x="375" y="153" text-anchor="middle" font-size="10" fill="#333">Generates ZK proof locally</text>
  <rect x="295" y="190" width="160" height="25" rx="4" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="375" y="207" text-anchor="middle" font-size="9" fill="#666">No raw data leaves device</text>

  <!-- Step 3: Device sends proof to third party -->
  <line x1="375" y1="240" x2="607" y2="240" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="491" y="233" text-anchor="middle" font-size="10" fill="#333">Sends ZK proof</text>
  <rect x="410" y="248" width="200" height="25" rx="4" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="510" y="265" text-anchor="middle" font-size="9" fill="#666">Only proof transmitted, not underlying data</text>

  <!-- Step 4: Third party verifies -->
  <line x1="620" y1="295" x2="620" y2="320" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="610" y1="295" x2="620" y2="295" stroke="#666" stroke-width="1.5"/>
  <line x1="610" y1="320" x2="620" y2="320" stroke="#666" stroke-width="1.5"/>
  <text x="610" y="288" text-anchor="middle" font-size="10" fill="#333">Verifies proof mathematically</text>
  <rect x="530" y="325" width="160" height="25" rx="4" fill="#f8f9fa" stroke="#ddd" stroke-width="1"/>
  <text x="610" y="342" text-anchor="middle" font-size="9" fill="#666">No need to contact platform</text>

  <!-- Privacy notes -->
  <rect x="50" y="320" width="180" height="35" rx="4" fill="#fff3e0" stroke="#f5a623" stroke-width="1"/>
  <text x="140" y="337" text-anchor="middle" font-size="9" fill="#8a5a00">Platform never knows where</text>
  <text x="140" y="349" text-anchor="middle" font-size="9" fill="#8a5a00">user authenticates</text>
</svg>
