<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Layer boxes -->
  <rect x="40" y="30" width="180" height="60" rx="8" fill="#bfb" stroke="#333" stroke-width="1.5"/>
  <text x="130" y="55" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Layer 1: Government ID</text>
  <text x="130" y="73" text-anchor="middle" font-size="10" fill="#555">via KYC provider</text>

  <rect x="260" y="30" width="180" height="60" rx="8" fill="#bbf" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="55" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Layer 2: Face Scan</text>
  <text x="350" y="73" text-anchor="middle" font-size="10" fill="#555">liveness check</text>

  <rect x="480" y="30" width="180" height="60" rx="8" fill="#fdb" stroke="#333" stroke-width="1.5"/>
  <text x="570" y="55" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Layer 3: OTP</text>
  <text x="570" y="73" text-anchor="middle" font-size="10" fill="#555">second factor</text>

  <!-- What each proves -->
  <rect x="40" y="150" width="180" height="45" rx="8" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="130" y="177" text-anchor="middle" font-size="11" fill="#333">Proves: Uniqueness</text>

  <rect x="260" y="150" width="180" height="45" rx="8" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="350" y="177" text-anchor="middle" font-size="11" fill="#333">Proves: Current holder</text>

  <rect x="480" y="150" width="180" height="45" rx="8" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="570" y="177" text-anchor="middle" font-size="11" fill="#333">Prevents: Bot-scale attacks</text>

  <!-- Arrows from layers to proofs -->
  <line x1="130" y1="90" x2="130" y2="147" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="90" x2="350" y2="147" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="90" x2="570" y2="147" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Combined guarantee box -->
  <rect x="200" y="260" width="300" height="50" rx="8" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="350" y="290" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Combined guarantee</text>

  <!-- Arrows from proofs to combined -->
  <line x1="130" y1="195" x2="280" y2="257" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="195" x2="350" y2="257" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="570" y1="195" x2="420" y2="257" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result box -->
  <rect x="150" y="340" width="400" height="50" rx="8" fill="#f9f" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="363" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Real government ID + matching face + unique phone</text>
  <text x="350" y="380" text-anchor="middle" font-size="11" fill="#555">= one human, one account</text>

  <!-- Arrow from combined to result -->
  <line x1="350" y1="310" x2="350" y2="337" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
