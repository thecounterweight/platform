<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Dispute Filed -->
  <rect x="270" y="15" width="160" height="40" rx="8" fill="#fbb" stroke="#333" stroke-width="1.5"/>
  <text x="350" y="40" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Dispute Filed</text>

  <!-- Structured Negotiation section -->
  <rect x="200" y="80" width="300" height="170" rx="8" fill="#f8f9fa" stroke="#d0d7e8" stroke-width="1"/>
  <text x="350" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Structured Negotiation</text>

  <rect x="230" y="110" width="240" height="30" rx="6" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="350" y="129" text-anchor="middle" font-size="10" fill="#555">Gather statements from both parties</text>

  <rect x="230" y="150" width="240" height="30" rx="6" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="350" y="169" text-anchor="middle" font-size="10" fill="#555">Identify agreement/disagreement points</text>

  <rect x="230" y="190" width="240" height="30" rx="6" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="350" y="209" text-anchor="middle" font-size="10" fill="#555">Suggest resolution ranges</text>

  <!-- Arrow from filed to negotiation -->
  <line x1="350" y1="55" x2="350" y2="77" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrows between steps -->
  <line x1="350" y1="140" x2="350" y2="147" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="350" y1="180" x2="350" y2="187" stroke="#666" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Resolved? decision 1 -->
  <rect x="280" y="270" width="140" height="40" rx="20" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="350" y="294" text-anchor="middle" font-size="11" fill="#8a5a00">Resolved?</text>
  <line x1="350" y1="250" x2="350" y2="267" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Yes - Done -->
  <rect x="520" y="275" width="100" height="35" rx="8" fill="#bfb" stroke="#333" stroke-width="1.5"/>
  <text x="570" y="297" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Done</text>
  <line x1="420" y1="290" x2="517" y2="290" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="283" font-size="9" fill="#666">Yes</text>

  <!-- No - Assisted Mediation -->
  <rect x="240" y="340" width="220" height="40" rx="8" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="350" y="358" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Assisted Mediation</text>
  <text x="350" y="372" text-anchor="middle" font-size="9" fill="#666">Human mediator with full context</text>
  <line x1="350" y1="310" x2="350" y2="337" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="328" font-size="9" fill="#666">No</text>

  <!-- Resolved? decision 2 -->
  <rect x="280" y="400" width="140" height="40" rx="20" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="350" y="424" text-anchor="middle" font-size="11" fill="#8a5a00">Resolved?</text>
  <line x1="350" y1="380" x2="350" y2="397" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Yes - Done (line to same Done box) -->
  <path d="M 420 420 C 500 420, 570 350, 570 313" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="400" font-size="9" fill="#666">Yes</text>

  <!-- No - Legal System -->
  <rect x="60" y="400" width="170" height="40" rx="8" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="145" y="424" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Legal System / Court</text>
  <line x1="280" y1="420" x2="233" y2="420" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="255" y="413" font-size="9" fill="#666">No</text>
</svg>
