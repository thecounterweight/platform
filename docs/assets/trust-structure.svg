<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Operating Company -->
  <rect x="210" y="20" width="180" height="50" rx="8" fill="#bfb" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="42" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Operating Company</text>
  <text x="300" y="58" text-anchor="middle" font-size="10" fill="#555">founder-owned</text>

  <!-- Irrevocable Purpose Trust -->
  <rect x="180" y="150" width="240" height="50" rx="8" fill="#f9f" stroke="#333" stroke-width="1.5"/>
  <text x="300" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Irrevocable Purpose Trust</text>
  <text x="300" y="188" text-anchor="middle" font-size="10" fill="#555">holds golden share</text>

  <!-- User-Elected Advisory Board -->
  <rect x="30" y="300" width="220" height="50" rx="8" fill="#bbf" stroke="#333" stroke-width="1.5"/>
  <text x="140" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#333">User-Elected Advisory Board</text>
  <text x="140" y="338" text-anchor="middle" font-size="10" fill="#555">elected by verified users</text>

  <!-- Trustees -->
  <rect x="320" y="300" width="250" height="55" rx="8" fill="#fdb" stroke="#333" stroke-width="1.5"/>
  <text x="445" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Trustees</text>
  <text x="445" y="336" text-anchor="middle" font-size="10" fill="#555">3 independent: institutional,</text>
  <text x="445" y="349" text-anchor="middle" font-size="10" fill="#555">user-elected board member, professional</text>

  <!-- Arrow: Trust → Operating Company (golden share veto) -->
  <line x1="300" y1="150" x2="300" y2="73" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="115" font-size="10" fill="#666">golden share veto</text>

  <!-- Arrow: Advisory Board → Trust (binding recommendation) -->
  <line x1="170" y1="300" x2="250" y2="203" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="160" y="255" font-size="10" fill="#666">binding recommendation</text>

  <!-- Arrow: Trustees → Trust (govern) -->
  <line x1="410" y1="300" x2="350" y2="203" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="255" font-size="10" fill="#666">govern</text>

  <!-- Dashed line: Operating Company -.-> Trust (founder excluded) -->
  <line x1="210" y1="60" x2="195" y2="148" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-dash)"/>
  <text x="135" y="108" font-size="10" fill="#999">founder excluded</text>
</svg>
