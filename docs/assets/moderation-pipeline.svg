<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Content posted -->
  <rect x="250" y="15" width="150" height="40" rx="8" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="325" y="40" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Content posted</text>

  <!-- ML triage -->
  <rect x="220" y="85" width="210" height="40" rx="8" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="325" y="109" text-anchor="middle" font-size="11" fill="#333">ML triage classifier scores</text>
  <line x1="325" y1="55" x2="325" y2="82" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Above threshold? -->
  <rect x="255" y="155" width="140" height="40" rx="20" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="325" y="179" text-anchor="middle" font-size="11" fill="#8a5a00">Above threshold?</text>
  <line x1="325" y1="125" x2="325" y2="152" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- No - Published -->
  <rect x="60" y="155" width="140" height="40" rx="8" fill="#bfb" stroke="#333" stroke-width="1.5"/>
  <text x="130" y="179" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Published - no action</text>
  <line x1="255" y1="175" x2="203" y2="175" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="228" y="168" font-size="9" fill="#666">No</text>

  <!-- Yes - Flagged for community vote -->
  <rect x="230" y="225" width="190" height="40" rx="8" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="325" y="249" text-anchor="middle" font-size="11" fill="#333">Flagged for community vote</text>
  <line x1="325" y1="195" x2="325" y2="222" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="335" y="212" font-size="9" fill="#666">Yes</text>

  <!-- Vote reaches threshold -->
  <rect x="245" y="295" width="160" height="40" rx="20" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="325" y="319" text-anchor="middle" font-size="11" fill="#8a5a00">Vote result?</text>
  <line x1="325" y1="265" x2="325" y2="292" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 60% downvote - Removed -->
  <rect x="150" y="365" width="110" height="40" rx="8" fill="#fbb" stroke="#333" stroke-width="1.5"/>
  <text x="205" y="389" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Removed</text>
  <line x1="280" y1="335" x2="230" y2="362" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="240" y="345" font-size="9" fill="#666">60% downvote</text>

  <!-- 60% upvote - Stays -->
  <rect x="380" y="365" width="110" height="40" rx="8" fill="#bfb" stroke="#333" stroke-width="1.5"/>
  <text x="435" y="389" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Stays</text>
  <line x1="370" y1="335" x2="415" y2="362" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="345" font-size="9" fill="#666">60% upvote</text>

  <!-- Retrain ML -->
  <rect x="230" y="435" width="190" height="40" rx="8" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="325" y="459" text-anchor="middle" font-size="11" fill="#333">Retrain ML classifier</text>
  <line x1="205" y1="405" x2="270" y2="432" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="435" y1="405" x2="380" y2="432" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="220" y="425" font-size="9" fill="#666">outcome</text>
  <text x="420" y="425" font-size="9" fill="#666">outcome</text>

  <!-- Feedback arrow back to ML triage -->
  <path d="M 420 455 C 600 455, 600 105, 433 105" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="560" y="280" font-size="9" fill="#666">improved scoring</text>

  <!-- URGENT PATH (right side) -->
  <!-- Urgent flag? -->
  <rect x="540" y="15" width="140" height="40" rx="20" fill="#fff3e0" stroke="#f5a623" stroke-width="1.5"/>
  <text x="610" y="39" text-anchor="middle" font-size="11" fill="#8a5a00">Urgent flag?</text>
  <line x1="400" y1="35" x2="537" y2="35" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Safety team removal -->
  <rect x="530" y="85" width="160" height="45" rx="8" fill="#fbb" stroke="#333" stroke-width="1.5"/>
  <text x="610" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Safety team</text>
  <text x="610" y="120" text-anchor="middle" font-size="10" fill="#555">immediate removal</text>
  <line x1="610" y1="55" x2="610" y2="82" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="620" y="72" font-size="9" fill="#666">Yes</text>

  <!-- Community review -->
  <rect x="530" y="160" width="160" height="45" rx="8" fill="#fff" stroke="#d0d7e8" stroke-width="1"/>
  <text x="610" y="180" text-anchor="middle" font-size="11" fill="#333">Community review</text>
  <text x="610" y="195" text-anchor="middle" font-size="10" fill="#555">within 48h</text>
  <line x1="610" y1="130" x2="610" y2="157" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Confirmed → Removed -->
  <path d="M 530 185 C 400 220, 250 300, 210 362" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="380" y="240" font-size="9" fill="#666">Confirmed</text>

  <!-- Reversed → Stays -->
  <path d="M 610 205 C 610 300, 490 340, 450 362" fill="none" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="280" font-size="9" fill="#666">Reversed</text>
</svg>
